name: Validate caller workflows

# Thin caller of HarperFast/ai-review-prompts' `_validate-caller-workflows.yml`.
# Validates `.github/workflows/claude-*.yml` caller files for:
#
#   * Shadow jobs — a non-`uses:` job (or a `uses:` outside `HarperFast/`)
#     alongside the legit reusable call would run with the caller's
#     permissions WITHOUT going through the auth gate. Fail-closed.
#   * Mutable refs in `uses:` or `with.ai-review-prompts-ref` — both
#     must pin to a 40-char SHA.
#
# Companion to the local `auth-gate-invariants.yml` here, which still
# validates the inline-pattern workflows (claude-mention.yml,
# claude-issue-to-pr.yml). Once those migrate to caller-pattern in a
# follow-up, the local validator can be retired and this becomes the
# only caller-side check.
#
# The `validate` job should be a REQUIRED status check on `main`
# (defense in depth alongside the local `auth-gate-invariants.yml`).

on:
  pull_request:
    paths:
      - '.github/workflows/claude-*.yml'
      - '.github/workflows/validate-caller-workflows.yml'
  push:
    branches: [main]
    paths:
      - '.github/workflows/claude-*.yml'
      - '.github/workflows/validate-caller-workflows.yml'

jobs:
  validate:
    uses: HarperFast/ai-review-prompts/.github/workflows/_validate-caller-workflows.yml@11872cb1cc2d0e90659659ade6d8ddbbdfbf1d05 # main 2026-05-06 (post #11/#12/#14)
    with:
      # Same SHA as the `uses:` ref above — the reusable uses this to
      # check out the validator script at the matching version. Same
      # SHA-twice pattern as the other caller workflows in this repo.
      ai-review-prompts-ref: 11872cb1cc2d0e90659659ade6d8ddbbdfbf1d05
