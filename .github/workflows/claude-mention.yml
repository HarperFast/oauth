name: Claude Mention Handler

# Responds to `@claude …` in PR comments and PR review (inline) comments.
# Claude enters the action's "agent mode": reads the commenter's request,
# uses the PR/issue as context, and can edit + commit + push to the PR
# branch. Gated to HarperFast org members/collaborators so external
# contributors can't trigger work against the repo.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

concurrency:
  # Queue explicit mentions per PR/issue — don't cancel. A user who
  # mentions Claude twice in quick succession probably wants both
  # honored (or the second after the first finishes), not the first
  # killed mid-flight.
  group: claude-mention-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  work:
    # Belt-and-suspenders gate:
    # 1. Comment must contain the trigger phrase.
    # 2. Commenter must be HarperFast org OWNER / MEMBER or a repo
    #    COLLABORATOR (the action also performs its own write-access
    #    check on the actor as a fallback).
    if: >-
      contains(github.event.comment.body, '@claude') &&
      contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'),
      github.event.comment.author_association)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      # Write access is intentional here — mention mode is "do work",
      # which means editing files, committing, and pushing (either to
      # the PR's branch or a new claude/… branch for issue-originated
      # asks).
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Clone shared Harper skills
        # Pinned to a SHA (not `main`) so agent behavior is reproducible
        # across runs — updates to the skills repo require an explicit
        # pin bump in this workflow.
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          repository: HarperFast/skills
          ref: d2db99bb37a6dde868cbc5ac81ca4146be8956fb # 1.3.0 (2026-04-16)
          path: .harper-skills

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: npm ci

      - name: Claude (agent mode)
        id: claude-agent
        uses: anthropics/claude-code-action@c3d45e8e941e1b2ad7b278c57482d9c5bf1f35b3 # v1.0.99
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          show_full_output: true
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 48
            --allowedTools "Read,Write,Edit,Grep,Glob,mcp__github_inline_comment__create_inline_comment,Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr comment:*),Bash(gh pr checkout:*),Bash(gh pr create:*),Bash(gh issue view:*),Bash(gh issue comment:*),Bash(git:*),Bash(npm install:*),Bash(npm ci:*),Bash(npm run:*),Bash(npm test:*),Bash(bun install:*),Bash(bun run:*),Bash(bun test:*),Bash(npx:*)"
          # In agent mode the action can use the triggering comment as the
          # prompt, but we inline it explicitly below to guarantee the agent
          # always has PR/issue number, URL, and the commenter's exact
          # request — without these, the agent has been observed to respond
          # "I don't see a specific task in this mention, could you share
          # the PR number?" which defeats the whole point of the workflow.
          prompt: |
            You were invoked via an `@claude` mention on ${{ github.repository }}.

            ## Mention context

            - Repo: ${{ github.repository }}
            - Target number: #${{ github.event.issue.number || github.event.pull_request.number }}
            - Target URL: ${{ github.event.issue.html_url || github.event.pull_request.html_url }}
            - Target kind: ${{ github.event.issue.pull_request && 'pull request' || (github.event.pull_request && 'pull request' || 'issue') }}
            - Commenter: @${{ github.event.comment.user.login }}

            The commenter wrote:

            > ${{ github.event.comment.body }}

            Start by reading the target so you have real context:
            - For a PR: `gh pr view <N>` then `gh pr diff <N>` if you need
              the changes.
            - For an issue: `gh issue view <N>`.

            Then act on the request. If the request is "review this PR",
            post the review as a single `gh pr comment` following the
            review discipline in `.github/review-scopes/universal.md` (in
            this repo) — do NOT treat review as a code-edit task.

            ## Conventions

            Read `CLAUDE.md` in the repo root first. Its "Code Conventions"
            and "Non-Obvious Gotchas" sections apply to any code you
            write. Match the repo's existing style rather than
            introducing a new one.

            For any change touching deployment patterns, docs about
            production, or Harper best practices, also consult the
            shared skills at `.harper-skills/harper-best-practices/rules/`.
            In particular,
            `.harper-skills/harper-best-practices/rules/deploying-to-harper-fabric.md`
            is authoritative for Harper's deployment model (Fabric). Do
            NOT recommend generic patterns (systemd units, raw
            Kubernetes, cloud secrets managers) without first checking
            whether a Harper-specific path applies.

            ## Before committing

            Scale validation to the kind of change you made:

            - Doc-only change (only `*.md`, `docs/**`, or
              `package.json` keyword/description edits): run
              `npm run format:check` and `npm run lint`. Do NOT run
              `npm run build` / `npm test` / `bun test` — they are
              not affected and waste turns.

              `config.yaml` is NOT doc-only — it holds the plugin
              entry point (`pluginModule`) and runtime OAuth defaults.
              Treat any change there as a code/config change.
            - Code or config change that affects behavior: run
              `npm run build && npm run lint && npm run format:check && npm test`
              and `bun test`. Fix anything that fails.

            When in doubt, err toward the fuller validation.

            ## Output

            - Scope your changes to exactly what the mention asked for.
              Don't refactor unrelated code.
            - Commit with a descriptive message referencing the
              issue/PR.
            - If the request is ambiguous or you have to make a
              judgment call that changes public API or semantics, post
              a comment on the PR/issue explaining your interpretation
              and stop — do NOT push speculative changes.
            - Do NOT use REQUEST_CHANGES or APPROVE on PRs. Post
              comments or push commits only.
