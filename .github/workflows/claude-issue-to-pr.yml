name: Claude Issue to PR

# Labeling an issue with `claude-fix:<type>` kicks Claude off to
# investigate, make a focused change on a new branch, and open a PR
# linking back to the issue. The label's suffix scopes the ask (typo
# vs docs vs deps vs bug).
#
# Gated to HarperFast org members/collaborators: even though GitHub's
# permission model already restricts who can apply labels, we add an
# explicit author_association check on the issue author so mislabeling
# by an outsider can't trigger work. The action also performs its own
# write-access check on the labeler as a fallback.

on:
  issues:
    types: [labeled]

concurrency:
  group: claude-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  authorize:
    # Single source of truth for "is this label trigger allowed to
    # spawn Claude on this repo?". The `work` job below has ONE `if:`
    # that depends on this — no step-level guards, no individual user
    # list.
    #
    # Cheap pre-filter at job level: explicit whitelist of allowed
    # labels (NOT `startsWith('claude-fix:')`, which would match typoed
    # variants like `claude-fix:typos`).
    #
    # We check the LABELER (`github.actor`), not the issue author. The
    # labeler must already have at least triage permission to apply a
    # label; a maintainer labeling an external-author issue is a
    # legitimate way to invoke the agent on community reports.
    #
    # Trust set: the @HarperFast teams listed in this repo's
    # `.github/CODEOWNERS`. Defaults to `@HarperFast/developers` if the
    # file is missing, empty, or has no HarperFast handles. External-
    # org handles are deliberately ignored.
    #
    # Required (organization-level) secrets:
    #   - HARPERFAST_AI_CLIENT_ID       (the App's Client ID, like Iv23li…)
    #   - HARPERFAST_AI_APP_PRIVATE_KEY (.pem file contents)
    if: contains(fromJSON('["claude-fix:typo","claude-fix:docs","claude-fix:deps","claude-fix:bug"]'), github.event.label.name)
    runs-on: ubuntu-latest
    timeout-minutes: 1
    permissions:
      contents: read # for the .github/CODEOWNERS fetch
    outputs:
      authorized: ${{ steps.check.outputs.authorized }}
    steps:
      - name: Mint org-read token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ secrets.HARPERFAST_AI_CLIENT_ID }}
          private-key: ${{ secrets.HARPERFAST_AI_APP_PRIVATE_KEY }}
          owner: HarperFast

      - name: Checkout (for CODEOWNERS read)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: |
            .github/CODEOWNERS
            .github/scripts/authorize-claude-workflow.sh
          sparse-checkout-cone-mode: false

      - name: Check labeler authorization
        id: check
        env:
          DEFAULT_TOKEN: ${{ github.token }}
          ORG_TOKEN: ${{ steps.app-token.outputs.token }}
          ADMIT_CLAUDE_BOT: 'false'
          USERS_TO_CHECK: ${{ github.actor }}
        run: bash .github/scripts/authorize-claude-workflow.sh

  work:
    needs: authorize
    if: needs.authorize.outputs.authorized == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout
        # Default shallow fetch (depth 1). The agent can commit and push on
        # a shallow clone; `git log` / `git blame` aren't reached for by
        # the current prompt. Bump to a deeper fetch only if we see the
        # agent blocked on history lookups.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Clone shared Harper skills
        # Pinned to a SHA (not `main`) so agent behavior is reproducible
        # across runs — updates to the skills repo require an explicit
        # pin bump in this workflow.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: HarperFast/skills
          ref: d2db99bb37a6dde868cbc5ac81ca4146be8956fb # 1.3.0 (2026-04-16)
          path: .harper-skills

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: npm ci

      - name: Claude (agent mode)
        id: claude-agent
        uses: anthropics/claude-code-action@ef50f123a3a9be95b60040d042717517407c7256 # v1.0.110
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          show_full_output: true
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 72
            # `--allowedTools` is convenience pre-approval, not a
            # security boundary — see claude-mention.yml for the full
            # rationale. Tools NOT listed below will still execute in
            # CI; the entries here document the expected surface.
            #
            # Real containment for this workflow (issue-to-PR mode
            # does AUTHORING work — branch creation, file edits,
            # commits, push):
            #   * Token scope: `contents: write`, `pull-requests: write`,
            #     `issues: write`, `id-token: write`. Repo-scoped only.
            #   * Branch protection on protected refs (`main` /
            #     `release_*` / `v*.x`) — prevents pushes to those
            #     refs even with broader git access.
            #   * Auth gate — only trusted labelers (HarperFast team
            #     members) trigger the workflow at all.
            #   * Allowed labels list (`claude-fix:typo` / `:docs` /
            #     `:deps` / `:bug`) — narrow trigger surface.
            #   * Runner ephemerality.
            #
            # Notable absences in spirit (`Bash(npx:*)` deliberately
            # not listed; `Bash(npm install)` no-arg) are prompt-level
            # signals, not enforcement — same caveat as in
            # claude-mention.yml.
            --allowedTools "Read,Write,Edit,Grep,Glob,Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr comment:*),Bash(gh pr create:*),Bash(gh issue view:*),Bash(gh issue comment:*),Bash(git:*),Bash(npm install),Bash(npm ci:*),Bash(npm run:*),Bash(npm test:*),Bash(bun install:*),Bash(bun run:*),Bash(bun test:*)"
          prompt: |
            You were invoked because issue #${{ github.event.issue.number }}
            on ${{ github.repository }} was labeled
            `${{ github.event.label.name }}`.

            ## The ask

            Title: `${{ github.event.issue.title }}`

            Body (verbatim, including any multi-line content):

            ```
            ${{ github.event.issue.body }}
            ```

            Source: ${{ github.event.issue.html_url }}

            ## Label-scoped behavior

            The label suffix tells you how much latitude you have:

            - `claude-fix:typo` — a single-file typo, prose tweak, or
              tiny doc fix. Should be one or two lines changed.
            - `claude-fix:docs` — a documentation update. Code should
              not be touched unless the doc is literally a code comment.
            - `claude-fix:deps` — a dependency version bump. Update
              `package.json` and regenerate the lockfile via
              `npm install` + verify `npm ci` works.
            - `claude-fix:bug` — a focused bug fix with at least one
              test that fails before the fix and passes after.

            Any ask that requires judgment beyond the label's scope —
            new public API, architecture changes, cross-cutting
            refactors — is OUT of scope. In that case, comment on the
            issue explaining what you see and do NOT open a PR.

            ## Conventions

            Read the repo's agent context files first (commonly
            `CLAUDE.md`, `AGENTS.md`, or similar at the repo root). Their
            "Code Conventions" and "Non-Obvious Gotchas" sections apply.
            Match the repo's style.

            For docs and deployment-related changes — especially doc
            issues like env-var / config / production-setup guidance —
            also consult the shared Harper skills at
            `.harper-skills/harper-best-practices/rules/`. In particular,
            `.harper-skills/harper-best-practices/rules/deploying-to-harper-fabric.md`
            is authoritative for Harper's deployment model (Fabric).
            Do NOT invent generic production patterns (systemd units,
            raw Kubernetes, cloud secrets managers, arbitrary .env
            recommendations) without first checking whether a
            Harper-specific path exists in those rules. If the skills
            don't cover the ask and the issue body doesn't specify,
            comment on the issue asking for clarification rather than
            guessing.

            ## Documentation scope boundary

            Harper maintains authoritative documentation at
            https://docs.harperdb.io covering core, pro, and fabric. This
            repo's docs should NOT re-explain Harper mechanics that the
            Harper docs already cover — they drift out of sync when the
            Harper docs update.

            When writing or revising docs here:

            - Document what's specific to THIS component — env var names,
              config shape, setup flow, integration API.
            - For anything not component-specific (deployment mechanics,
              runtime env var handling, Fabric configuration, core Harper
              behavior, SQL, replication), LINK to the Harper docs rather
              than re-explaining.

            This is a general rule, not specific to any one area.

            ## Process

            1. Create a branch named `claude/fix-${{ github.event.issue.number }}`
               (or append `-<short-desc>` if useful).
            2. Make the change scoped to the label.
            3. Validate, scaling to the kind of change you made.

               **`config.yaml` is NOT doc-only** — it holds the plugin
               entry point (`pluginModule`) and runtime OAuth defaults.
               Any change that touches `config.yaml` requires the full
               validation path regardless of the `claude-fix:*` label.

               - `claude-fix:typo` / `claude-fix:docs` (doc-only
                 changes to `*.md`, `docs/**`, or `package.json`
                 keyword/description fields): run
                 `npm run format:check` and `npm run lint`. Skip
                 `npm run build` / `npm test` / `bun test` — they
                 are not affected and waste turns.
               - `claude-fix:deps` / `claude-fix:bug` or any change
                 that touches code or `config.yaml`: run
                 `npm run build && npm run lint && npm run format:check && npm test`
                 and `bun test`. Fix anything that fails.

               When in doubt, err toward the fuller validation.
            4. Commit with a descriptive message.
            5. Push the branch and open a PR via `gh pr create` with a
               body that says `Closes #${{ github.event.issue.number }}`.
            6. Post a comment on the original issue linking to the PR.

            ## Must NOT

            - Do NOT push to `main` or any `release_*` / `v*.x` branch.
            - Do NOT use REQUEST_CHANGES or APPROVE on any PR.
            - Do NOT open a PR when the ask is out of scope — comment
              and stop.
            - Do NOT commit secrets, credentials, or large generated
              artifacts (e.g. `node_modules/`, coverage output).
